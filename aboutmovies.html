<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details & Reviews</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cast-page-container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 30px;
            background: rgba(13, 13, 13, 0.95);
            border: 1px solid #222;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }
        .back-home-btn {
            display: inline-block;
            background: #ff0000;
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
            border-radius: 5px;
            margin-bottom: 30px;
            transition: all 0.2s;
        }
        .back-home-btn:hover { background: #fff; color: #ff0000; }
        .cast-header-title { font-size: 36px; color: #fff; margin-bottom: 5px; font-weight: 800; }
        .cast-subtitle {
            color: #ff0000; text-transform: uppercase; letter-spacing: 2px; font-size: 14px; font-weight: bold; margin-bottom: 25px; border-bottom: 2px solid #222; padding-bottom: 10px;
        }
        .cast-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .cast-card { background: #111; border: 1px solid #252525; padding: 15px; border-radius: 8px; }
        .cast-card:hover { border-color: #ff0000; }
        .actor-name { color: #ffcc00; font-size: 16px; font-weight: bold; margin-bottom: 4px; }
        .character-name { color: #cccccc; font-size: 14px; font-style: italic; }
        .character-label { color: #666; font-size: 11px; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .error-msg { text-align: center; color: #888; padding: 40px 0; }
        
        .trailer-section {
            margin: 45px 0;
            display: none; 
            background: rgba(20, 20, 20, 0.6);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #ff0000;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            border-radius: 6px;
            border: 1px solid #333;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.8);
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .review-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-rev-btn {
            background: #cc0000;
            color: #fff;
            border: none;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
        }
        .delete-rev-btn:hover { background: #ff3333; }
        .action-notice-tag {
            font-size: 12px;
            color: #ffcc00;
            background: rgba(255, 204, 0, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 204, 0, 0.2);
            margin-bottom: 12px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <main class="cast-page-container">
        <a href="index.html" class="back-home-btn">&#10094; Back to Movies Hub</a>

        <div id="castContent">
            <h1 id="movieName" class="cast-header-title">Loading Movie...</h1>
            <p class="cast-subtitle">Principal Cast & Characters</p>
            <div id="castGrid" class="cast-grid"></div>

            <div id="trailerSection" class="trailer-section">
                <p class="cast-subtitle" style="border: none; margin-bottom: 15px; padding-bottom: 0;">Official Cinematic Trailer</p>
                <div class="video-wrapper">
                    <iframe id="trailerVideo" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>

            <div class="review-section">
                <h3>User Reviews & Ratings</h3>
                <div class="review-input-container">
                    <div id="statusNotice" style="display:none;"></div>
                    <div class="star-rating" id="pageStars" data-rating="0">
                        <div class="star-wrapper" data-index="1"><div class="half left"></div><div class="half right"></div><span class="star-icon">&#9733;</span></div>
                        <div class="star-wrapper" data-index="2"><div class="half left"></div><div class="half right"></div><span class="star-icon">&#9733;</span></div>
                        <div class="star-wrapper" data-index="3"><div class="half left"></div><div class="half right"></div><span class="star-icon">&#9733;</span></div>
                        <div class="star-wrapper" data-index="4"><div class="half left"></div><div class="half right"></div><span class="star-icon">&#9733;</span></div>
                        <div class="star-wrapper" data-index="5"><div class="half left"></div><div class="half right"></div><span class="star-icon">&#9733;</span></div>
                        <span id="liveRatingText" style="margin-left:10px; font-weight:bold; color:#ffcc00; font-size:16px;">0/5</span>
                    </div>
                    <textarea id="reviewText" placeholder="Write your thoughts about this movie..."></textarea>
                    <button id="submitBtn" onclick="submitReview()">Submit Review</button>
                </div>
                <div class="saved-reviews" id="reviewsContainer"></div>
            </div>
        </div>
    </main>

    <script>
        const movieDatabase = {

                ]

                ]

                ]

                ]
            },

                cast: [
                    { actor: "Tom Holland", character: "Peter Parker / Spider-Man" },

                ]
            },

                cast: [

                    { actor: "Al Pacino", character: "Michael Corleone" },
                    { actor: "James Caan", character: "Sonny Corleone" }
                ]
            },
            "Schindler's List": {

                ]

                ]
            },
            "The Lord of the Rings: The Return of the King": {

                cast: [
                    { actor: "Elijah Wood", character: "Frodo Baggins" },

            },

                ]
            },

                cast: [
                    { actor: "Jamie Foxx", character: "Django" },

                ]
            },
            "Prisoners": {
                trailer: "https://www.youtube.com/embed/bpXfcTF6iVk",
                cast: [
                    { actor: "Hugh Jackman", character: "Keller Dover" },
                    { actor: "Jake Gyllenhaal", character: "Detective Loki" }
                ]
            },
            "The Prestige": {
                trailer: "https://www.youtube.com/embed/ijXgBIYg3-8",
                cast: [
                    { actor: "Hugh Jackman", character: "Robert Angier" },
                    { actor: "Christian Bale", character: "Alfred Borden" }
                ]
            },
            "The Wolf of Wall Street": {
                trailer: "https://www.youtube.com/embed/iszwuX1AK6A",
                cast: [
                    { actor: "Leonardo DiCaprio", character: "Jordan Belfort" },
                    { actor: "Jonah Hill", character: "Donnie Azoff" }
                ]
            },
            "Seven Samurai": {
                trailer: "https://www.youtube.com/embed/7mWqreDq0co",
                cast: [
                    { actor: "Toshiro Mifune", character: "Kikuchiyo" },
                    { actor: "Takashi Shimura", character: "Kambei Shimada" }
                ]
            },
            "Parasite": {
                trailer: "https://www.youtube.com/embed/5xH0HfJHsaY",
                cast: [
                    { actor: "Song Kang-ho", character: "Ki-taek" },
                    { actor: "Lee Sun-kyun", character: "Mr. Park" }
                ]
            },
            "Dead Poets Society": {
                trailer: "https://www.youtube.com/embed/4lj185DaZ_o",
                cast: [
                    { actor: "Robin Williams", character: "John Keating" },
                    { actor: "Ethan Hawke", character: "Todd Anderson" }
                ]
            },
            "12 Angry Men": {
                trailer: "https://www.youtube.com/embed/A7CBKT0PWFA",
                cast: [
                    { actor: "Henry Fonda", character: "Juror 8" },
                    { actor: "Lee J. Cobb", character: "Juror 3" }
                ]
            }
        };

        let currentMovieTitle = "";
        let selectedRating = 0;

        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            currentMovieTitle = urlParams.get('movie');

            const titleDisplay = document.getElementById("movieName");
            const gridDisplay = document.getElementById("castGrid");

            if (currentMovieTitle && movieDatabase[currentMovieTitle]) {
                titleDisplay.innerText = currentMovieTitle;
                
                const targetMovieData = movieDatabase[currentMovieTitle];
                const castList = targetMovieData.cast;
                
                castList.forEach(member => {
                    const card = document.createElement("div");
                    card.className = "cast-card";
                    card.innerHTML = `
                        <span class="character-label">Actor</span>
                        <div class="actor-name">${escapeHTML(member.actor)}</div>
                        <span class="character-label" style="margin-top: 8px;">As Character</span>
                        <div class="character-name">${escapeHTML(member.character)}</div>
                    `;
                    gridDisplay.appendChild(card);
                });

                if (targetMovieData.trailer) {
                    const trailerBox = document.getElementById("trailerSection");
                    const trailerVideo = document.getElementById("trailerVideo");
                    trailerVideo.src = targetMovieData.trailer;
                    trailerBox.style.display = "block";
                }

                setupHalfStars();
                checkAndLoadExistingReview();
                displayReviews();
            } else {
                titleDisplay.innerText = "Movie Not Found";
                gridDisplay.innerHTML = `<p class="error-msg">Sorry, we couldn't load details for this movie selection.</p>`;
                document.querySelector(".review-section").style.display = "none";
            }
        });

        function setupHalfStars() {
            const wrappers = document.querySelectorAll("#pageStars .star-wrapper");
            wrappers.forEach(wrapper => {
                const index = parseInt(wrapper.getAttribute("data-index"));
                const leftHalf = wrapper.querySelector(".half.left");
                const rightHalf = wrapper.querySelector(".half.right");

                leftHalf.addEventListener("mouseover", () => highlightPageStars(index - 0.5));
                rightHalf.addEventListener("mouseover", () => highlightPageStars(index));
                leftHalf.addEventListener("click", () => { selectedRating = index - 0.5; highlightPageStars(selectedRating); });
                rightHalf.addEventListener("click", () => { selectedRating = index; highlightPageStars(selectedRating); });
            });
            document.getElementById("pageStars").addEventListener("mouseleave", () => highlightPageStars(selectedRating));
        }

        function highlightPageStars(rating) {
            const wrappers = document.querySelectorAll("#pageStars .star-wrapper");
            document.getElementById("liveRatingText").innerText = (rating > 0 ? rating : "0") + "/5";
            wrappers.forEach(wrapper => {
                const index = parseInt(wrapper.getAttribute("data-index"));
                const icon = wrapper.querySelector(".star-icon");
                icon.classList.remove("filled", "half-filled");
                if (index <= rating) icon.classList.add("filled");
                else if (index - 0.5 === rating) icon.classList.add("half-filled");
            });
        }

        function checkAndLoadExistingReview() {
            let allReviews = JSON.parse(localStorage.getItem('movie_reviews')) || {};
            let currentMovieReviews = allReviews[currentMovieTitle] || [];
            const noticeBox = document.getElementById("statusNotice");
            const submitBtn = document.getElementById("submitBtn");

            if (currentMovieReviews.length > 0) {
                // Since user is limited to one single review, it will always be index 0
                const userReview = currentMovieReviews[0];
                selectedRating = userReview.rating;
                document.getElementById('reviewText').value = userReview.text;
                highlightPageStars(selectedRating);

                noticeBox.innerHTML = `<span class="action-notice-tag">You already reviewed this movie. Submitting will update your current review.</span>`;
                noticeBox.style.display = "block";
                submitBtn.innerText = "Update Review";
            } else {
                document.getElementById('reviewText').value = "";
                selectedRating = 0;
                highlightPageStars(0);
                noticeBox.style.display = "none";
                submitBtn.innerText = "Submit Review";
            }
        }

        function submitReview() {
            const textInput = document.getElementById('reviewText').value.trim();
            if (selectedRating === 0 || textInput === "") { alert("Please complete your rating and comment!"); return; }

            const updatedReview = { rating: selectedRating, text: textInput, date: new Date().toLocaleDateString() };
            let allReviews = JSON.parse(localStorage.getItem('movie_reviews')) || {};
            
            // Enforce single review constraint by completely setting or replacing the entry array array
            allReviews[currentMovieTitle] = [updatedReview];
            localStorage.setItem('movie_reviews', JSON.stringify(allReviews));

            checkAndLoadExistingReview();
            displayReviews();
        }

        function deleteReview() {
            if (!confirm("Are you sure you want to delete your review?")) return;

            let allReviews = JSON.parse(localStorage.getItem('movie_reviews')) || {};
            if (allReviews[currentMovieTitle]) {
                delete allReviews[currentMovieTitle];
                localStorage.setItem('movie_reviews', JSON.stringify(allReviews));
            }

            checkAndLoadExistingReview();
            displayReviews();
        }

        function displayReviews() {
            const container = document.getElementById('reviewsContainer');
            container.innerHTML = "";
            let allReviews = JSON.parse(localStorage.getItem('movie_reviews')) || {};
            let currentMovieReviews = allReviews[currentMovieTitle] || [];

            if (currentMovieReviews.length === 0) {
                container.innerHTML = `<p style="color: #666; font-size: 13px; font-style: italic;">No reviews left yet.</p>`;
                return;
            }

            currentMovieReviews.forEach(rev => {
                const reviewDiv = document.createElement('div');
                reviewDiv.className = 'review-item';
                reviewDiv.innerHTML = `
                    <div class="review-meta review-header-row">
                        <div>
                            <span>${renderStarsHTML(rev.rating)}</span>
                            <span style="margin-left: 10px;">${rev.date}</span>
                        </div>
                        <button class="delete-rev-btn" onclick="deleteReview()">Delete Review</button>
                    </div>
                    <div class="review-text" style="margin-top: 10px;">${escapeHTML(rev.text)}</div>
                `;
                container.appendChild(reviewDiv);
            });
        }

        function renderStarsHTML(rating) {
            let markup = "";
            for (let i = 1; i <= 5; i++) {
                if (i <= rating) markup += `<span class="gold-txt">&#9733;</span>`;
                else if (i - 0.5 === rating) markup += `<span class="gold-txt partial-star">&#9733;</span>`;
                else markup += `<span class="grey-txt">&#9734;</span>`;
            }
            return markup;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
</body>
</html>
